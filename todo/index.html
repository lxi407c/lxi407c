<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 목록</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: white;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 14px 20px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
    }

    .item.done {
      opacity: 0.5;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item span {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }

    .item.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .item .del {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .item .del:hover {
      color: #ff4d4f;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 15px;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 할 일 목록</h1>
    <div class="input-row">
      <input id="input" type="text" placeholder="할 일을 입력하세요" />
      <button onclick="addItem()">+</button>
    </div>
    <div class="stats">
      <span id="total">전체 0개</span>
      <span id="done-count">완료 0개</span>
    </div>
    <div class="list" id="list"></div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('list');
      const total = todos.length;
      const done = todos.filter(t => t.done).length;

      document.getElementById('total').textContent = `전체 ${total}개`;
      document.getElementById('done-count').textContent = `완료 ${done}개`;

      if (total === 0) {
        list.innerHTML = '<div class="empty">할 일을 추가해보세요 🙂</div>';
        return;
      }

      list.innerHTML = todos.map((t, i) => `
        <div class="item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${i})" />
          <span>${t.text}</span>
          <button class="del" onclick="remove(${i})">🗑</button>
        </div>
      `).join('');
    }

    function addItem() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(i) {
      todos[i].done = !todos[i].done;
      save();
      render();
    }

    function remove(i) {
      todos.splice(i, 1);
      save();
      render();
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
